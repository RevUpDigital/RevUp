<!DOCTYPE html>
<html>
<head>
  <title>RevUp - Send Review SMS</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 80px;
      box-sizing: border-box;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      box-sizing: border-box;
      z-index: 10;
    }

    .logo {
      font-weight: bold;
      color: #2563eb;
      font-size: 20px;
    }

    .nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #334155;
      font-weight: 500;
    }

    .nav a:hover {
      color: #2563eb;
    }

    .box {
      width: 390px;
      background: white;
      padding: 28px;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h3 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 22px;
    }

    .subtitle {
      color: #64748b;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    .usage-box {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      color: #334155;
      margin-bottom: 14px;
      font-weight: 700;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      box-sizing: border-box;
      border-radius: 10px;
      font-size: 14px;
    }

    input {
      border: 1px solid #e2e8f0;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      background: #1d4ed8;
    }

    .secondary {
      background: #f1f5f9;
      color: #334155;
    }

    .secondary:hover {
      background: #e2e8f0;
    }

    .upgrade {
      background: #635bff;
      color: white;
    }

    .upgrade:hover {
      background: #5148e5;
    }

    .access-box {
      display: none;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .active-box {
      display: none;
      background: #ecfdf5;
      border: 1px solid #bbf7d0;
      color: #166534;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 14px;
      font-weight: 700;
    }

    #status {
      margin-top: 14px;
      font-size: 14px;
      color: #334155;
    }
  </style>
</head>

<body>
  <div class="nav">
    <div class="logo">RevUp 🚀</div>
    <div>
      <a href="/">Home</a>
      <a href="#" onclick="goToDashboard()">Dashboard</a>
      <a href="/profile.html">Profile</a>
      <a href="/logout">Logout</a>
    </div>
  </div>

  <div class="box">
    <h3>Send Review SMS</h3>
    <div class="subtitle" id="businessSubtitle">Loading business...</div>

    <div id="activeBox" class="active-box">
      ✅ Active — you can send SMS review requests.
    </div>

    <div id="accessBox" class="access-box">
      Your account does not have access yet. Upgrade to send SMS review requests.
    </div>

    <div id="usageInfo" class="usage-box">Loading SMS usage...</div>

    <input id="name" placeholder="Customer Name" />
    <input id="phone" placeholder="Phone e.g. +61412345678" />
        
    <button id="sendButton" onclick="sendSMS()">Send SMS</button>
    <button class="upgrade" onclick="upgrade('basic')">Upgrade to Basic ($29)</button>
    <button class="upgrade" onclick="upgrade('pro')">Upgrade to Pro ($59)</button>
    <button class="secondary" onclick="goToDashboard()">View Dashboard</button>
    
    <div id="status"></div>
  </div>

  <script>
    let currentUser = null;

    async function checkLogin() {
      const res = await fetch("/me");
      const user = await res.json();

      if (!user.loggedIn) {
        window.location.href = "/login.html";
        return false;
      }

      currentUser = user;
      updateAccessUI(user);

      return true;
    }

    function updateAccessUI(user) {
      const accessBox = document.getElementById("accessBox");
      const activeBox = document.getElementById("activeBox");
      const sendButton = document.getElementById("sendButton");

      const upgradeButtons = document.querySelectorAll(".upgrade");

      if (user.hasAccess) {
        accessBox.style.display = "none";
        activeBox.style.display = "block";
        sendButton.style.display = "block";

        upgradeButtons.forEach(btn => btn.style.display = "none");
      } else {
        accessBox.style.display = "block";
        activeBox.style.display = "none";
        sendButton.style.display = "none";

        upgradeButtons.forEach(btn => btn.style.display = "block");
      }
    }

    async function loadUsage() {
      const usageInfo = document.getElementById("usageInfo");

      try {
        const res = await fetch("/user-usage");
        const usage = await res.json();

        if (!res.ok) {
          usageInfo.innerText = "SMS usage unavailable.";
          return;
        }

        if (usage.smsLimit === "unlimited") {
          usageInfo.innerText = `SMS Used: ${usage.smsUsed} / Unlimited`;
        } else {
          usageInfo.innerText = `SMS Used: ${usage.smsUsed}/${usage.smsLimit} — ${usage.smsRemaining} remaining`;
        }
      } catch (err) {
        usageInfo.innerText = "SMS usage unavailable.";
      }
    }

    async function upgrade(plan = "basic") {
      const status = document.getElementById("status");
      status.innerText = "Opening Stripe Checkout...";

      try {
        const res = await fetch("/create-checkout-session", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ plan })
        });

        const data = await res.json();

        if (data.url) {
          window.location.href = data.url;
        } else {
          status.innerText = "❌ " + (data.error || "Could not start checkout.");
        }
      } catch (err) {
        console.log("STRIPE ERROR:", err);
        status.innerText = "❌ Could not connect to Stripe.";
      }
    }

    const params = new URLSearchParams(window.location.search);

    let businessSlug = localStorage.getItem("businessSlug");

    if (!businessSlug) {
      window.location.href = "/signup.html";
    }

    async function loadBusiness() {
      const status = document.getElementById("status");
      const businessSubtitle = document.getElementById("businessSubtitle");

      try {
        const res = await fetch(`/business/${businessSlug}`);
        const business = await res.json();

        if (!res.ok) {
          businessSubtitle.innerText = "Business not found.";
          status.innerText = "❌ Business not found. Please switch business.";
          return;
        }

        localStorage.setItem("businessSlug", businessSlug);

        document.querySelector("h3").innerText = "Send Review SMS";
        businessSubtitle.innerText = `Sending as ${business.businessName}`;
      } catch (err) {
        console.log("LOAD BUSINESS ERROR:", err);
        businessSubtitle.innerText = "Could not load business.";
        status.innerText = "❌ Could not load business.";
      }
    }

    async function sendSMS() {
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const status = document.getElementById("status");

      if (!currentUser || !currentUser.hasAccess) {
        status.innerText = "❌ Please upgrade before sending SMS.";
        return;
      }

      if (!name || !phone) {
        status.innerText = "❌ Please enter customer name and phone.";
        return;
      }

      status.innerText = "Sending SMS...";

      try {
        const res = await fetch("/send-sms", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name,
            phone,
            businessSlug
          })
        });

        const data = await res.json();

        if (data.success) {
          if (data.smsLimit === "unlimited" || data.smsRemaining === "unlimited") {
            status.innerText = "✅ SMS sent successfully. Unlimited SMS available.";
          } else {
            status.innerText = `✅ SMS sent successfully. ${data.smsRemaining} SMS remaining this month.`;
          }

          document.getElementById("name").value = "";
          document.getElementById("phone").value = "";

          loadUsage();
        } else {
          let errorMessage = data.error || "Failed to send SMS.";

          if (typeof errorMessage === "string") {
            errorMessage = errorMessage.replace(/^"(.*)"$/, "$1");
          }

          status.innerText = "❌ " + errorMessage;

          loadUsage();
        }
      } catch (err) {
        console.log("FETCH ERROR:", err);
        status.innerText = "❌ Cannot connect to server.";
      }
    }

    function goToDashboard() {
      window.location.href = `/dashboard.html?business=${businessSlug}`;
    }

    
    checkLogin().then((loggedIn) => {
      if (loggedIn) {
        loadBusiness();
        loadUsage();
      }
    });
  </script>
</body>
</html>
