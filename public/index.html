<!DOCTYPE html>
<html>
<head>
  <title>RevUp - Send Review SMS</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 80px;
      box-sizing: border-box;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      box-sizing: border-box;
      z-index: 10;
    }

    .logo {
      font-weight: bold;
      color: #2563eb;
      font-size: 20px;
    }

    .nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #334155;
      font-weight: 500;
    }

    .nav a:hover {
      color: #2563eb;
    }

    .box {
      width: 390px;
      background: white;
      padding: 28px;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h3 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 22px;
    }

    .subtitle {
      color: #64748b;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      box-sizing: border-box;
      border-radius: 10px;
      font-size: 14px;
    }

    input {
      border: 1px solid #e2e8f0;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      background: #1d4ed8;
    }

    .secondary {
      background: #f1f5f9;
      color: #334155;
    }

    .secondary:hover {
      background: #e2e8f0;
    }

    #status {
      margin-top: 14px;
      font-size: 14px;
      color: #334155;
    }
  </style>
</head>

<body>
  <div class="nav">
    <div class="logo">RevUp 🚀</div>
    <div>
      <a href="/">Home</a>
      <a href="/signup.html">Signup</a>
      <a href="#" onclick="goToDashboard()">Dashboard</a>
    </div>
  </div>

  <div class="box">
    <h3>Send Review SMS</h3>
    <div class="subtitle" id="businessSubtitle">Loading business...</div>

    <input id="name" placeholder="Customer Name" />
    <input id="phone" placeholder="Phone e.g. +61412345678" />
        
    <button onclick="sendSMS()">Send SMS</button>
    <button class="secondary" onclick="goToDashboard()">View Dashboard</button>
    <button class="secondary" onclick="switchBusiness()">Switch Business</button>

    <div id="status"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    let businessSlug = params.get("business");

    if (!businessSlug) {
      businessSlug = localStorage.getItem("businessSlug");
    }

    if (!businessSlug) {
      window.location.href = "/signup.html";
    }

    async function loadBusiness() {
      const status = document.getElementById("status");
      const businessSubtitle = document.getElementById("businessSubtitle");

      try {
        const res = await fetch(`/business/${businessSlug}`);
        const business = await res.json();

        if (!res.ok) {
          businessSubtitle.innerText = "Business not found.";
          status.innerText = "❌ Business not found. Please switch business.";
          return;
        }

        localStorage.setItem("businessSlug", businessSlug);

        document.querySelector("h3").innerText = "Send Review SMS";
        businessSubtitle.innerText = `Sending as ${business.businessName}`;

      } catch (err) {
        console.log("LOAD BUSINESS ERROR:", err);
        businessSubtitle.innerText = "Could not load business.";
        status.innerText = "❌ Could not load business.";
      }
    }

    async function sendSMS() {
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const status = document.getElementById("status");

      if (!name || !phone) {
        status.innerText = "❌ Please enter customer name and phone.";
        return;
      }

      status.innerText = "Sending SMS...";

      try {
        const res = await fetch("/send-sms", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name,
            phone,
            businessSlug
          })
        });

        const data = await res.json();

        if (data.success) {
          status.innerText = "✅ SMS sent successfully.";
          document.getElementById("name").value = "";
          document.getElementById("phone").value = "";
        } else {
          status.innerText = "❌ Failed: " + JSON.stringify(data.error);
        }

      } catch (err) {
        console.log("FETCH ERROR:", err);
        status.innerText = "❌ Cannot connect to server.";
      }
    }

    function goToDashboard() {
      window.location.href = `/dashboard.html?business=${businessSlug}`;
    }

    function switchBusiness() {
      localStorage.removeItem("businessSlug");
      window.location.href = "/signup.html";
    }

    loadBusiness();
  </script>
</body>
</html>
