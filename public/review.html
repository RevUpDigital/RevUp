<!DOCTYPE html>
<html>
<head>
  <title>RevUp - Leave Feedback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(15,23,42,0.10);
      border: 1px solid #e2e8f0;
      text-align: center;
    }

    .logo {
      font-size: 20px;
      font-weight: 800;
      color: #2563eb;
      margin-bottom: 16px;
    }

    h2 {
      margin: 0 0 20px;
      font-size: 26px;
      line-height: 1.3;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .good {
      background: #22c55e;
      color: white;
    }

    .bad {
      background: #ef4444;
      color: white;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      margin-top: 14px;
      font-family: inherit;
    }

    .submit {
      width: 100%;
      margin-top: 16px;
      background: #2563eb;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .submit:hover {
      background: #1d4ed8;
    }

    .small {
      font-size: 13px;
      color: #64748b;
      margin-top: 12px;
    }
  </style>
</head>

<body>

<div class="card">
  <div class="logo">RevUp</div>

  <h2 id="title">Loading...</h2>

  <div class="buttons">
    <button class="btn good" onclick="goodReview()">😊 Good</button>
    <button class="btn bad" onclick="badReview()">😡 Bad</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

const businessSlug = params.get("business");
const customerName = params.get("name") || "there";

let businessData = null;

async function loadBusiness() {
  if (!businessSlug) {
    document.querySelector(".card").innerHTML = `
      <h2>Invalid link</h2>
      <p class="small">This review link is missing a business reference.</p>
    `;
    return;
  }

  try {
    const res = await fetch(`/business/${businessSlug}`);
    const business = await res.json();

    if (!res.ok) {
      document.querySelector(".card").innerHTML = `
        <h2>Business not found</h2>
        <p class="small">Please check the review link.</p>
      `;
      return;
    }

    businessData = business;

    document.getElementById("title").innerText =
      `Hi ${customerName}, how was your experience with ${business.businessName}?`;

  } catch (err) {
    document.querySelector(".card").innerHTML = `
      <h2>Error loading page</h2>
      <p class="small">Please try again later.</p>
    `;
  }
}

function goodReview() {
  if (!businessData) return;
  window.location.href = businessData.googleReviewLink;
}

function badReview() {
  const heading = businessData?.feedbackHeading || "We're sorry to hear that";

  document.querySelector(".card").innerHTML = `
    <div class="logo">RevUp</div>
    <h2>${heading}</h2>
    <p class="small">Please tell us what went wrong:</p>
    <textarea id="feedback" rows="4"></textarea>
    <button class="submit" onclick="submitFeedback()">Submit feedback</button>
  `;
}

async function submitFeedback() {
  const feedback = document.getElementById("feedback").value;

  if (!feedback.trim()) {
    alert("Please enter your feedback.");
    return;
  }

  try {
    const res = await fetch("/save-feedback", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        businessSlug,
        name: customerName,
        feedback
      })
    });

    const result = await res.json();

    if (result.success) {
      document.querySelector(".card").innerHTML = `
        <div class="logo">RevUp</div>
        <h2>Thanks for your feedback 🙏</h2>
        <p class="small">We appreciate you taking the time to help improve the experience.</p>
      `;
    } else {
      alert("Something went wrong.");
    }

  } catch (err) {
    alert("Could not submit feedback.");
  }
}

loadBusiness();
</script>

</body>
</html>
