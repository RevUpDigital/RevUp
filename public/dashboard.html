<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>RevUp - Feedback Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e2e8f0;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #2563eb;
      text-decoration: none;
    }

    .nav-links a {
      margin-left: 22px;
      color: #334155;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    .nav-links a:hover { color: #2563eb; }

    .nav-cta {
      background: #2563eb;
      color: white !important;
      padding: 10px 16px;
      border-radius: 999px;
    }

    .container {
      max-width: 1050px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 30px;
    }

    .badge {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 40px;
      line-height: 1.1;
      letter-spacing: -0.8px;
      margin: 0 0 10px;
    }

    .subtitle {
      color: #64748b;
      line-height: 1.6;
      margin: 0;
      max-width: 620px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button, .button-link {
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: 800;
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
    }

    button:hover, .button-link:hover {
      background: #1d4ed8;
    }

    .secondary {
      background: white;
      color: #334155;
      border: 1px solid #e2e8f0;
    }

    .secondary:hover {
      background: #f1f5f9;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 28px;
    }

    .summary-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(15,23,42,0.05);
    }

    .summary-card strong {
      display: block;
      font-size: 30px;
      color: #2563eb;
      margin-bottom: 6px;
    }

    .summary-card span {
      color: #64748b;
      font-size: 14px;
    }

    .feedback-list {
      display: grid;
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 30px rgba(15,23,42,0.05);
    }

    .name {
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .business {
      font-size: 13px;
      color: #2563eb;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .feedback {
      color: #334155;
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .date {
      font-size: 13px;
      color: #64748b;
    }

    .empty {
      background: white;
      border-radius: 20px;
      padding: 28px;
      color: #64748b;
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 30px rgba(15,23,42,0.05);
      line-height: 1.6;
    }

    @media (max-width: 800px) {
      .nav { padding: 16px 20px; }
      .nav-links a {
        margin-left: 12px;
        font-size: 13px;
      }

      .header {
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>

  <div class="nav">
    <a href="/" class="logo">RevUp 🚀</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a id="appLink" href="/index.html">App</a>
      <a href="/profile.html">Profile</a>
      <a href="/logout">Logout</a>
      <a href="/signup.html" class="nav-cta">Start free</a>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <div>
        <div class="badge">Private feedback dashboard</div>
        <h1 id="dashboardTitle">Feedback Dashboard</h1>
        <p id="dashboardSubtitle" class="subtitle">
          View customer feedback submitted through your review funnel.
        </p>
      </div>

      <div class="actions">
        <button class="secondary" onclick="goToApp()">Send SMS</button>
        <button onclick="loadFeedback()">Refresh</button>
      </div>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <strong id="totalFeedback">0</strong>
        <span>Total feedback entries</span>
      </div>

      <div class="summary-card">
        <strong id="latestDate">—</strong>
        <span>Latest feedback</span>
      </div>

      <div class="summary-card">
        <strong>Private</strong>
        <span>Negative feedback captured before Google</span>
      </div>
    </div>

    <div id="feedbackList" class="feedback-list"></div>
  </div>

  <script>
    async function checkLogin() {
      const res = await fetch("/me");
      const user = await res.json();

      if (!user.loggedIn) {
        window.location.href = "/login.html";
        return false;
      }

      return true;
    }
    
    const params = new URLSearchParams(window.location.search);

    let businessSlug = params.get("business");

    if (!businessSlug) {
      businessSlug = localStorage.getItem("businessSlug");
    }

    if (businessSlug) {
      localStorage.setItem("businessSlug", businessSlug);
      document.getElementById("appLink").href = `/index.html?business=${businessSlug}`;
    }

    function goToApp() {
      if (businessSlug) {
        window.location.href = `/index.html?business=${businessSlug}`;
      } else {
        window.location.href = "/signup.html";
      }
    }

    async function loadBusinessName() {
      if (!businessSlug) {
        document.getElementById("dashboardSubtitle").innerText =
          "No business selected. Create or select a business to view feedback.";
        return;
      }

      try {
        const res = await fetch(`/business/${businessSlug}`);
        const business = await res.json();

        if (res.ok) {
          document.getElementById("dashboardTitle").innerText =
            `${business.businessName} Dashboard`;

          document.getElementById("dashboardSubtitle").innerText =
            "View private customer feedback captured through your review funnel.";
        }
      } catch (err) {
        console.log("LOAD BUSINESS ERROR:", err);
      }
    }

    async function loadFeedback() {
      const container = document.getElementById("feedbackList");
      container.innerHTML = "<div class='empty'>Loading feedback...</div>";

      try {
        let url = "/get-feedback";

        if (businessSlug) {
          url += `?businessSlug=${encodeURIComponent(businessSlug)}`;
        }

        const res = await fetch(url);
        const data = await res.json();

        document.getElementById("totalFeedback").innerText = data.length;

        if (data.length) {
          document.getElementById("latestDate").innerText =
            new Date(data[0].date).toLocaleDateString();
        } else {
          document.getElementById("latestDate").innerText = "—";
        }

        if (!data.length) {
          container.innerHTML = `
            <div class='empty'>
              No feedback submitted yet.<br>
              Once unhappy customers leave feedback, it will appear here.
            </div>
          `;
          return;
        }

        container.innerHTML = "";

        data.forEach(item => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <div class="name">${item.name || "Unknown customer"}</div>
            <div class="business">${item.businessName || item.businessSlug || ""}</div>
            <div class="feedback">${item.feedback}</div>
            <div class="date">${new Date(item.date).toLocaleString()}</div>
          `;

          container.appendChild(card);
        });
      } catch (error) {
        console.error("Dashboard error:", error);
        container.innerHTML = "<div class='empty'>Could not load feedback.</div>";
      }
    }

    checkLogin().then((loggedIn) => {
      if (loggedIn) {
        loadBusinessName();
        loadFeedback();
      }
    });
  </script>
</body>
</html>
