<!DOCTYPE html>
<html>
<head>
  <title>RevUp - Create Your Business</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 420px;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: #2563eb;
      margin-bottom: 10px;
    }

    h2 {
      margin: 0 0 10px;
    }

    p {
      color: #64748b;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      font-size: 14px;
    }

    textarea {
      min-height: 80px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .error {
      color: #ef4444;
      margin-top: 12px;
      font-size: 14px;
    }

    .result {
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="card">
  <div class="logo">RevUp 🚀</div>
  <h2>Create your business</h2>
  <p>Start collecting reviews automatically.</p>

  <input id="businessName" placeholder="Business Name" />
  <input id="email" placeholder="Business Email" />
  <input id="googleReviewLink" placeholder="Google Review Link" />

  <textarea id="smsMessage">Hi {{name}}, thanks for choosing us. Please leave a review: {{reviewLink}}</textarea>

    <button onclick="createBusiness()">Create Business</button>

  <div id="error" class="error"></div>
  <div id="result" class="result"></div>
</div>

<script>
function createSlug(text) {
  return text
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9\s-]/g, "")
    .replace(/\s+/g, "-")
    .replace(/-+/g, "-");
}

async function createBusiness() {
  const businessName = document.getElementById("businessName").value.trim();
  const email = document.getElementById("email").value.trim();
  const googleReviewLink = document.getElementById("googleReviewLink").value.trim();
  const smsMessage = document.getElementById("smsMessage").value.trim();
  
  const error = document.getElementById("error");
  const result = document.getElementById("result");

  error.innerText = "";
  result.innerText = "";

  if (!businessName || !email || !googleReviewLink || !smsMessage) {
    error.innerText = "Please fill in all fields.";
    return;
  }

  const slug = createSlug(businessName);

  try {
    const res = await fetch("/create-business", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        businessName,
        slug,
        email,
        googleReviewLink,
        smsMessage,
      })
    });

    const data = await res.json();

    if (!data.success) {
      if (data.error === "duplicate") {
        error.innerText = "❌ Business already exists. Try another name.";
      } else {
        error.innerText = data.error || "Something went wrong.";
      }
      return;
    }

    result.innerText = "✅ Creating your dashboard...";

    localStorage.setItem("businessSlug", slug);

    setTimeout(() => {
      window.location.href = `/index.html?business=${slug}`;
    }, 1200);

  } catch (err) {
    error.innerText = "Could not connect to server.";
  }
}
</script>

</body>
</html>
