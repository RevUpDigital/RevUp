<!DOCTYPE html>
<html>
<head>
  <title>RevUp - Create Your Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e2e8f0;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #2563eb;
      text-decoration: none;
    }

    .nav-links a {
      margin-left: 22px;
      color: #334155;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    .nav-links a:hover { color: #2563eb; }

    .nav-cta {
      background: #2563eb;
      color: white !important;
      padding: 10px 16px;
      border-radius: 999px;
    }

    .page {
      min-height: calc(100vh - 72px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: white;
      padding: 36px;
      border-radius: 24px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 20px 60px rgba(15,23,42,0.10);
    }

    .badge {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 36px;
      line-height: 1.1;
      letter-spacing: -0.8px;
      margin: 0 0 12px;
    }

    p {
      color: #64748b;
      line-height: 1.6;
      margin: 0 0 24px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 700;
      color: #334155;
    }

    input, textarea {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      font-size: 14px;
      font-family: inherit;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover { background: #1d4ed8; }

    .error {
      color: #ef4444;
      margin-top: 14px;
      font-size: 14px;
      font-weight: 600;
    }

    .result {
      margin-top: 14px;
      font-size: 14px;
      color: #16a34a;
      font-weight: 700;
    }

    @media (max-width: 700px) {
      .nav { padding: 16px 20px; }
      .nav-links a {
        margin-left: 12px;
        font-size: 13px;
      }
      .card { padding: 28px; }
      h1 { font-size: 30px; }
    }
  </style>
</head>

<body>

<div class="nav">
  <a href="/" class="logo">RevUp 🚀</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/index.html">Send SMS</a>
    <a href="/signup.html" class="nav-cta">Start free</a>
  </div>
</div>

<div class="page">
  <div class="card">
    <div class="badge">Create your review funnel</div>

    <h1>Create your business</h1>
    <p>Set up your business profile, add your Google review link, and start sending SMS review requests.</p>

    <label for="businessName">Business name</label>
    <input id="businessName" placeholder="e.g. Coastal Plumbing" />

    <label for="email">Business email</label>
    <input id="email" placeholder="e.g. hello@business.com" />

    <label for="googleReviewLink">Google review link</label>
    <input id="googleReviewLink" placeholder="Paste your Google review link" />

    <label for="smsMessage">SMS message</label>
    <textarea id="smsMessage">Hi {{name}}, thanks for choosing {{businessName}}. We’d really appreciate a quick review: {{reviewLink}}</textarea>

    <button onclick="createBusiness()">Create Business</button>

    <div id="error" class="error"></div>
    <div id="result" class="result"></div>
  </div>
</div>

<script>
async function checkLogin() {
  const res = await fetch("/me");
  const user = await res.json();

  if (!user.loggedIn) {
    window.location.href = "/register.html";
    return false;
  }

  return true;
}

checkLogin().then((loggedIn) => {
  if (!loggedIn) return;
});

function createSlug(text) {
  return text
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9\s-]/g, "")
    .replace(/\s+/g, "-")
    .replace(/-+/g, "-");
}

async function createBusiness() {
  const businessName = document.getElementById("businessName").value.trim();
  const email = document.getElementById("email").value.trim();
  const googleReviewLink = document.getElementById("googleReviewLink").value.trim();
  const smsMessage = document.getElementById("smsMessage").value.trim();
  
  const error = document.getElementById("error");
  const result = document.getElementById("result");

  error.innerText = "";
  result.innerText = "";

  if (!businessName || !email || !googleReviewLink || !smsMessage) {
    error.innerText = "Please fill in all fields.";
    return;
  }

  const slug = createSlug(businessName);

  try {
    const res = await fetch("/create-business", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        businessName,
        slug,
        email,
        googleReviewLink,
        smsMessage
      })
    });

    const data = await res.json();

    if (!data.success) {
      if (data.error === "duplicate") {
        error.innerText = "❌ Business already exists. Try another name.";
      } else {
        error.innerText = data.error || "Something went wrong.";
      }
      return;
    }

    result.innerText = "✅ Creating your dashboard...";

    localStorage.setItem("businessSlug", slug);

    setTimeout(() => {
      window.location.href = `/index.html?business=${slug}`;
    }, 1200);

  } catch (err) {
    error.innerText = "Could not connect to server.";
  }
}
</script>

</body>
</html>
