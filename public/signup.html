<!DOCTYPE html>

<html>
<head>
  <title>RevUp - Business Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e2e8f0;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 22px !important;
      font-weight: 800 !important;
      color: #2563eb !important;
      text-decoration: none !important;
      white-space: nowrap !important;
      line-height: 1 !important;
      display: inline-flex !important;
      align-items: center !important;
      flex-shrink: 0 !important;
    }

    .nav-links a {
      margin-left: 22px;
      color: #334155;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    .nav-links a:hover { color: #2563eb; }

    .account-menu {
      position: relative;
      display: inline-block;
      margin-left: 22px;
    }

    .avatar-btn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: 800;
      cursor: pointer;
      padding: 0;
      margin: 0;
    }

    .avatar-btn:hover {
      background: #1d4ed8;
    }

    .account-dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: 48px;
      width: 220px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      padding: 8px;
      z-index: 99;
    }

    .account-dropdown.show {
      display: block;
    }

    .account-dropdown a,
    .account-dropdown button {
      display: block;
      width: 100%;
      padding: 10px 12px;
      color: #334155;
      text-decoration: none;
      background: white;
      border: none;
      text-align: left;
      font-weight: 400;
      border-radius: 8px;
      cursor: pointer;
      margin: 0 !important;
      font-size: 14px;
      font-family: inherit;
      box-sizing: border-box;
    }

    .account-dropdown a:hover,
    .account-dropdown button:hover {
      background: #eef2ff;
      color: #2563eb;
    }

    .account-email {
      font-size: 13px;
      color: #64748b;
      padding: 10px 14px;
      border-bottom: 1px solid #e2e8f0;
      margin-bottom: 6px;
    }

    .page {
      min-height: calc(100vh - 72px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 20px;
      visibility: hidden;
    }

    .page.ready {
      visibility: visible;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: white;
      padding: 36px;
      border-radius: 24px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 20px 60px rgba(15,23,42,0.10);
    }

    .badge {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 36px;
      line-height: 1.1;
      letter-spacing: -0.8px;
      margin: 0 0 12px;
    }

    p {
      color: #64748b;
      line-height: 1.6;
      margin: 0 0 24px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 700;
      color: #334155;
    }

    input, textarea {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      font-size: 14px;
      font-family: inherit;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover { background: #1d4ed8; }

    .error {
      color: #ef4444;
      margin-top: 14px;
      font-size: 14px;
      font-weight: 600;
    }

    .result {
      margin-top: 14px;
      font-size: 14px;
      color: #16a34a;
      font-weight: 700;
    }

    @media (max-width: 800px) {
      .nav {
        padding: 16px 20px;
      }

      .nav-links {
        display: flex;
        align-items: center;
        flex-wrap: nowrap;
        gap: 12px;
      }

      .nav-links a {
        margin-left: 0;
        font-size: 13px;
        white-space: nowrap;
      }

      .account-menu {
        margin-left: 0;
      }

      .page {
        padding: 50px 20px;
      }
    }
  

    

  
    /* ===== RevUp clean shared navigation system ===== */
    .nav {
      height: 72px !important;
      min-height: 72px !important;
      padding: 0 40px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      gap: 24px !important;
      flex-wrap: nowrap !important;
      box-sizing: border-box !important;
    }

    .nav .logo,
    .logo {
      font-size: 22px !important;
      font-weight: 800 !important;
      color: #2563eb !important;
      text-decoration: none !important;
      white-space: nowrap !important;
      line-height: 1 !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      flex-shrink: 0 !important;
      margin: 0 !important;
      letter-spacing: 0 !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    }

    .nav .logo:hover,
    .logo:hover {
      color: #2563eb !important;
      text-decoration: none !important;
    }

    .nav-links,
    .nav > div:last-child {
      display: flex !important;
      align-items: center !important;
      justify-content: flex-end !important;
      gap: 22px !important;
      flex-wrap: nowrap !important;
      white-space: nowrap !important;
      min-width: 0 !important;
    }

    .nav a,
    .nav-links a {
      margin-left: 0 !important;
      font-size: 14px !important;
      line-height: 1 !important;
      font-weight: 600 !important;
      color: #334155;
      text-decoration: none;
      white-space: nowrap !important;
    }

    .nav a:hover,
    .nav-links a:hover {
      color: #2563eb !important;
    }

    .account-menu {
      margin-left: 0 !important;
      flex-shrink: 0 !important;
      position: relative !important;
      display: inline-block !important;
    }

    .avatar-btn {
      width: 36px !important;
      height: 36px !important;
      min-width: 36px !important;
      min-height: 36px !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      padding: 0 !important;
      margin: 0 !important;
      border-radius: 999px !important;
      font-size: 14px !important;
      font-weight: 800 !important;
      line-height: 1 !important;
      flex-shrink: 0 !important;
    }

    #loggedOutNav,
    #loggedInNav {
      align-items: center !important;
      gap: 22px !important;
      flex-wrap: nowrap !important;
      white-space: nowrap !important;
    }

    #loggedInNav {
      align-items: center !important;
    }

    @media (max-width: 700px) {
      .nav {
        height: 76px !important;
        min-height: 76px !important;
        padding: 0 16px !important;
        gap: 14px !important;
      }

      .nav .logo,
      .logo {
        font-size: 22px !important;
        font-weight: 800 !important;
        line-height: 1 !important;
      }

      .nav-links,
      .nav > div:last-child {
        gap: 12px !important;
        flex-wrap: nowrap !important;
        align-items: center !important;
      }

      .nav a,
      .nav-links a {
        font-size: 14px !important;
      }

      #loggedOutNav,
      #loggedInNav {
        gap: 12px !important;
      }

      .account-dropdown {
        right: 0 !important;
      }
    }

    @media (max-width: 430px) {
      .nav {
        padding: 0 14px !important;
        gap: 10px !important;
      }

      .nav-links,
      .nav > div:last-child {
        gap: 10px !important;
      }

      .nav a,
      .nav-links a {
        font-size: 13px !important;
      }
    }

  
    /* ===== RevUp blue navbar theme ===== */
    .nav {
      background: #2563eb !important;
      border-bottom: 1px solid #1d4ed8 !important;
      box-shadow: 0 10px 26px rgba(37,99,235,0.18) !important;
      backdrop-filter: none !important;
    }

    .nav .logo,
    .logo {
      color: #ffffff !important;
    }

    .nav a,
    .nav-links a {
      color: #ffffff !important;
    }

    .nav a:hover,
    .nav-links a:hover {
      color: #dbeafe !important;
    }

    .nav a.nav-cta,
    .nav-links a.nav-cta,
    .nav-cta {
      background: #ffffff !important;
      color: #0f172a !important;
      border: 1px solid rgba(255,255,255,0.65) !important;
      box-shadow: 0 8px 18px rgba(15,23,42,0.12) !important;
    }

    .nav a.nav-cta:hover,
    .nav-links a.nav-cta:hover,
    .nav-cta:hover {
      background: #eff6ff !important;
      color: #1d4ed8 !important;
    }

    .avatar-btn {
      background: #ffffff !important;
      color: #2563eb !important;
      border: 1px solid rgba(255,255,255,0.75) !important;
      box-shadow: 0 8px 18px rgba(15,23,42,0.12) !important;
    }

    .avatar-btn:hover {
      background: #eff6ff !important;
      color: #1d4ed8 !important;
    }

    .account-dropdown {
      background: #ffffff !important;
      color: #334155 !important;
    }

    .account-dropdown a,
    .account-dropdown button,
    .nav .account-dropdown a,
    .nav .account-dropdown button {
      color: #334155 !important;
      background: #ffffff !important;
    }

    .account-dropdown a:hover,
    .account-dropdown button:hover,
    .nav .account-dropdown a:hover,
    .nav .account-dropdown button:hover {
      background: #eef2ff !important;
      color: #2563eb !important;
    }

    .account-email {
      color: #64748b !important;
    }

  
    /* ===== Logo hover visibility fix ===== */
    .logo:hover,
    .nav .logo:hover {
      color: #dbeafe !important;
    }

  
    /* ===== RevUp navbar logo image ===== */
    .logo img {
      height: 42px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    @media (max-width: 700px) {
      .logo img {
        height: 36px;
      }
    }

  </style>

</head>

<body>

<div class="nav">
  <a href="/" class="logo"><img src="/revup-logo.png" alt="RevUp"></a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/index.html" id="sendSmsLink">Send SMS</a>
    <a href="#" onclick="goToDashboard()">Dashboard</a>

    <div class="account-menu">
      <button class="avatar-btn" onclick="toggleAccountMenu()" id="avatarBtn"></button>

      <div class="account-dropdown" id="accountDropdown">
        <div class="account-email" id="accountEmail">Account</div>
        <a href="/profile.html">Profile settings</a>
        <a href="/signup.html">Business settings</a>
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>
</div>

<div class="page">
  <div class="card">
    <div class="badge" id="badgeText">Create your review funnel</div>

<h1 id="title">Create your business</h1>
<p id="subtitle">Set up your business profile, add your Google review link, and start sending SMS review requests.</p>

<label>Business name</label>
<input id="businessName" />

<label>Business email</label>
<input id="email" />

<label>Google review link</label>
<input id="googleReviewLink" />

<label>SMS message</label>
<textarea id="smsMessage"></textarea>

<button id="submitBtn" onclick="handleSubmit()">Create Business</button>

<div id="error" class="error"></div>
<div id="result" class="result"></div>

  </div>
</div>

<script>
let isEditMode = false;
let existingSlug = null;

async function init() {
  const res = await fetch("/me");
  const user = await res.json();

  if (!user.loggedIn) {
    window.location.href = "/register.html";
    return;
  }

  if (user.email) {
    const avatar = document.getElementById("avatarBtn");
    const accountEmail = document.getElementById("accountEmail");

    if (avatar) {
      avatar.innerText = user.email.charAt(0).toUpperCase();
    }

    if (accountEmail) {
      accountEmail.innerText = user.email;
    }
  }

  const businessRes = await fetch("/my-business");
  const data = await businessRes.json();

  if (data.business) {
    isEditMode = true;
    existingSlug = data.business.slug;

    document.getElementById("title").innerText = "Edit your business";
    document.getElementById("badgeText").innerText = "Business settings";
    document.getElementById("submitBtn").innerText = "Save Changes";

    document.getElementById("businessName").value = data.business.businessName || "";
    document.getElementById("email").value = data.business.email || "";
    document.getElementById("googleReviewLink").value = data.business.googleReviewLink || "";
    document.getElementById("smsMessage").value = data.business.smsMessage || "";

    localStorage.setItem("businessSlug", existingSlug);
    document.getElementById("sendSmsLink").href = `/index.html?business=${existingSlug}`;
  } else {
    document.getElementById("title").innerText = "Create your business";
    document.getElementById("badgeText").innerText = "Create your review funnel";
    document.getElementById("submitBtn").innerText = "Create Business";

    document.getElementById("smsMessage").value =
      "Hi {{name}}, thanks for choosing {{businessName}}. We’d really appreciate a quick review: {{reviewLink}}";
  }

  document.querySelector(".page").classList.add("ready");
}

function createSlug(text) {
  return text.toLowerCase().trim().replace(/[^a-z0-9\s-]/g, "").replace(/\s+/g, "-");
}

async function handleSubmit() {
  const businessName = document.getElementById("businessName").value.trim();
  const email = document.getElementById("email").value.trim();
  const googleReviewLink = document.getElementById("googleReviewLink").value.trim();
  const smsMessage = document.getElementById("smsMessage").value.trim();

  const error = document.getElementById("error");
  const result = document.getElementById("result");

  error.innerText = "";
  result.innerText = "";

  if (!businessName || !email || !googleReviewLink || !smsMessage) {
    error.innerText = "Please fill in all fields.";
    return;
  }

  try {
    let res;

    if (isEditMode) {
      res = await fetch("/update-business", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          businessName,
          email,
          googleReviewLink,
          smsMessage
        })
      });
    } else {
      const slug = createSlug(businessName);

      res = await fetch("/create-business", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          businessName,
          slug,
          email,
          googleReviewLink,
          smsMessage
        })
      });

      existingSlug = slug;
    }

    const data = await res.json();

    if (!data.success) {
      error.innerText = data.error || "Something went wrong.";
      return;
    }

    result.innerText = isEditMode ? "✅ Changes saved!" : "✅ Business created!";

    setTimeout(() => {
      localStorage.setItem("businessSlug", existingSlug);
      window.location.href = `/index.html?business=${existingSlug}`;
    }, 1200);

  } catch (err) {
    error.innerText = "Could not connect to server.";
  }
}

function goToDashboard() {
  if (existingSlug) {
    window.location.href = `/dashboard.html?business=${existingSlug}`;
  } else {
    window.location.href = "/dashboard.html";
  }
}

async function logout() {
  try {
    await fetch("/logout", { method: "POST" });
    localStorage.clear();
    window.location.href = "/login.html";
  } catch (err) {
    window.location.href = "/logout";
  }
}

function toggleAccountMenu() {
  document.getElementById("accountDropdown").classList.toggle("show");
}

window.addEventListener("click", function(e) {
  const menu = document.querySelector(".account-menu");

  if (menu && !menu.contains(e.target)) {
    document.getElementById("accountDropdown").classList.remove("show");
  }
});

init();
</script>

</body>
</html>
