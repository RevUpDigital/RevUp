<!DOCTYPE html>
<html>
<head>
  <title>RevUp Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: sans-serif;
      background: #f8fafc;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .filters {
      margin-bottom: 20px;
    }

    .filters button {
      margin-right: 10px;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
    }

    .stat {
      background: #f1f5f9;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 22px;
    }

    .business {
      margin-top: 10px;
      padding: 12px;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>

<body>

<h1>RevUp Admin Dashboard</h1>

<div class="filters">
  <button onclick="loadStats(7)">Last 7 Days</button>
  <button onclick="loadStats(30)">Last 30 Days</button>
  <button onclick="loadStats(0)">All Time</button>
</div>

<div class="card">
  <h2>Global Stats</h2>
  <div class="grid" id="globalStats"></div>
</div>

<div class="card">
  <h2>Performance Chart</h2>
  <canvas id="statsChart"></canvas>
</div>

<div class="card">
  <h2>Business Stats</h2>
  <div id="businessStats"></div>
</div>

<script>
let chart;

async function loadStats(days = 0) {
  const res = await fetch(`/admin-stats?days=${days}`);
  const data = await res.json();

  const g = data.global;

  // Global stats UI
  document.getElementById("globalStats").innerHTML = `
    <div class="stat"><strong>${g.smsSent}</strong>SMS Sent</div>
    <div class="stat"><strong>${g.linkClicked}</strong>Link Clicks</div>
    <div class="stat"><strong>${g.goodClicks}</strong>Google Redirects</div>
    <div class="stat"><strong>${g.badClicks}</strong>Bad Clicks</div>
    <div class="stat"><strong>${g.feedback}</strong>Feedback</div>
  `;

  // Chart
  const ctx = document.getElementById("statsChart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["SMS", "Clicks", "Google", "Bad", "Feedback"],
      datasets: [{
        label: "Activity",
        data: [
          g.smsSent,
          g.linkClicked,
          g.goodClicks,
          g.badClicks,
          g.feedback
        ]
      }]
    }
  });

  // Business stats
  const businesses = data.businesses;
  let html = "";

  Object.values(businesses).forEach(b => {
    const clickRate = b.smsSent ? ((b.linkClicked / b.smsSent) * 100).toFixed(1) : 0;
    const positiveRate = b.linkClicked ? ((b.goodClicks / b.linkClicked) * 100).toFixed(1) : 0;

    html += `
      <div class="business">
        <strong>${b.businessName}</strong><br>
        SMS: ${b.smsSent} |
        Clicks: ${b.linkClicked} (${clickRate}%) |
        Google: ${b.goodClicks} (${positiveRate}%) |
        Bad: ${b.badClicks} |
        Feedback: ${b.feedback}
      </div>
    `;
  });

  document.getElementById("businessStats").innerHTML = html;
}

// Load default (all time)
loadStats();
</script>

</body>
</html>
