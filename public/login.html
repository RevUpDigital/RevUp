<!DOCTYPE html>
<html>
<head>
  <title>RevUp - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .nav {
      background: rgba(255,255,255,0.95);
      border-bottom: 1px solid #e2e8f0;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 22px !important;

      color: #2563eb !important;
      text-decoration: none !important;
      white-space: nowrap !important;
      line-height: 1 !important;
      display: inline-flex !important;

    .nav a {

    .page {
      min-height: calc(100vh - 72px);

      justify-content: center;

    .card {
      width: 100%;

      background: white;
      padding: 36px;
      border-radius: 24px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 20px 60px rgba(15,23,42,0.10);

    .badge {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      padding: 8px 12px;
      border-radius: 999px;

      font-size: 13px;
      margin-bottom: 18px;
    }
    h1 {
      font-size: 34px;
      margin: 0 0 12px;
      letter-spacing: -0.8px;
    }
    p {
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 700;
      color: #334155;
    }
    input {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .error {
      color: #ef4444;
      margin-top: 14px;
      font-size: 14px;
      font-weight: 600;
    }
    .result {
      margin-top: 14px;
      font-size: 14px;
      color: #16a34a;
      font-weight: 700;
    }
    .small-link {
      text-align: center;
      margin-top: 18px;
      color: #64748b;
      font-size: 14px;
    }
    .small-link a {
      color: #2563eb;
      font-weight: 700;
      text-decoration: none;
    }

    @media (max-width: 700px) {
      .nav {
        padding: 16px 20px;
        align-items: center;
      }

    .logo {
      font-size: 22px !important;
      font-weight: 800 !important;
      color: #2563eb !important;
      text-decoration: none !important;
      white-space: nowrap !important;
      line-height: 1 !important;
      display: inline-flex !important;
      align-items: center !important;
      flex-shrink: 0 !important;
    }

      .nav > div {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .nav a {
        margin-left: 0;
        font-size: 14px;
        white-space: nowrap;
      }

      .nav-cta {
        display: none;
      }

      .page {
        padding: 50px 20px;
      }
    }
  

    

  
    /* ===== RevUp clean shared navigation system ===== */
    .nav {
      height: 72px !important;
      min-height: 72px !important;
      padding: 0 40px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      gap: 24px !important;
      flex-wrap: nowrap !important;
      box-sizing: border-box !important;
    }

    .nav .logo,
    .logo {
      font-size: 22px !important;
      font-weight: 800 !important;
      color: #2563eb !important;
      text-decoration: none !important;
      white-space: nowrap !important;
      line-height: 1 !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      flex-shrink: 0 !important;
      margin: 0 !important;
      letter-spacing: 0 !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    }

    .nav .logo:hover,
    .logo:hover {
      color: #2563eb !important;
      text-decoration: none !important;
    }

    .nav-links,
    .nav > div:last-child {
      display: flex !important;
      align-items: center !important;
      justify-content: flex-end !important;
      gap: 22px !important;
      flex-wrap: nowrap !important;
      white-space: nowrap !important;
      min-width: 0 !important;
    }

    .nav a,
    .nav-links a {
      margin-left: 0 !important;
      font-size: 14px !important;
      line-height: 1 !important;
      font-weight: 600 !important;
      color: #334155;
      text-decoration: none;
      white-space: nowrap !important;
    }

    .nav a:hover,
    .nav-links a:hover {
      color: #2563eb !important;
    }

    .account-menu {
      margin-left: 0 !important;
      flex-shrink: 0 !important;
      position: relative !important;
      display: inline-block !important;
    }

    .avatar-btn {
      width: 36px !important;
      height: 36px !important;
      min-width: 36px !important;
      min-height: 36px !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      padding: 0 !important;
      margin: 0 !important;
      border-radius: 999px !important;
      font-size: 14px !important;
      font-weight: 800 !important;
      line-height: 1 !important;
      flex-shrink: 0 !important;
    }

    #loggedOutNav,
    #loggedInNav {
      align-items: center !important;
      gap: 22px !important;
      flex-wrap: nowrap !important;
      white-space: nowrap !important;
    }

    #loggedInNav {
      align-items: center !important;
    }

    @media (max-width: 700px) {
      .nav {
        height: 76px !important;
        min-height: 76px !important;
        padding: 0 16px !important;
        gap: 14px !important;
      }

      .nav .logo,
      .logo {
        font-size: 22px !important;
        font-weight: 800 !important;
        line-height: 1 !important;
      }

      .nav-links,
      .nav > div:last-child {
        gap: 12px !important;
        flex-wrap: nowrap !important;
        align-items: center !important;
      }

      .nav a,
      .nav-links a {
        font-size: 14px !important;
      }

      #loggedOutNav,
      #loggedInNav {
        gap: 12px !important;
      }

      .account-dropdown {
        right: 0 !important;
      }
    }

    @media (max-width: 430px) {
      .nav {
        padding: 0 14px !important;
        gap: 10px !important;
      }

      .nav-links,
      .nav > div:last-child {
        gap: 10px !important;
      }

      .nav a,
      .nav-links a {
        font-size: 13px !important;
      }
    }

  
    /* ===== RevUp blue navbar theme ===== */
    .nav {
      background: #2563eb !important;
      border-bottom: 1px solid #1d4ed8 !important;
      box-shadow: 0 10px 26px rgba(37,99,235,0.18) !important;
      backdrop-filter: none !important;
    }

    .nav .logo,
    .logo {
      color: #ffffff !important;
    }

    .nav a,
    .nav-links a {
      color: #ffffff !important;
    }

    .nav a:hover,
    .nav-links a:hover {
      color: #dbeafe !important;
    }

    .nav a.nav-cta,
    .nav-links a.nav-cta,
    .nav-cta {
      background: #ffffff !important;
      color: #0f172a !important;
      border: 1px solid rgba(255,255,255,0.65) !important;
      box-shadow: 0 8px 18px rgba(15,23,42,0.12) !important;
    }

    .nav a.nav-cta:hover,
    .nav-links a.nav-cta:hover,
    .nav-cta:hover {
      background: #eff6ff !important;
      color: #1d4ed8 !important;
    }

    .avatar-btn {
      background: #ffffff !important;
      color: #2563eb !important;
      border: 1px solid rgba(255,255,255,0.75) !important;
      box-shadow: 0 8px 18px rgba(15,23,42,0.12) !important;
    }

    .avatar-btn:hover {
      background: #eff6ff !important;
      color: #1d4ed8 !important;
    }

    .account-dropdown {
      background: #ffffff !important;
      color: #334155 !important;
    }

    .account-dropdown a,
    .account-dropdown button,
    .nav .account-dropdown a,
    .nav .account-dropdown button {
      color: #334155 !important;
      background: #ffffff !important;
    }

    .account-dropdown a:hover,
    .account-dropdown button:hover,
    .nav .account-dropdown a:hover,
    .nav .account-dropdown button:hover {
      background: #eef2ff !important;
      color: #2563eb !important;
    }

    .account-email {
      color: #64748b !important;
    }

  
    /* ===== Logo hover visibility fix ===== */
    .logo:hover,
    .nav .logo:hover {
      color: #dbeafe !important;
    }

  
    /* ===== RevUp navbar logo image ===== */
    .logo img {
      height: 48px !important;
      width: auto !important;
      display: block !important;
      object-fit: contain !important;
    }

    @media (max-width: 700px) {
      .logo img {
        height: 42px !important;
      }
    }

  </style>
</head>

<body>
  <div class="nav">
    <a href="/" class="logo"><img src="/revup-logo.png" alt="RevUp"></a>
    <div>
      <a href="/">Home</a>
      <a href="/login.html">Login</a>
      <a href="/register.html" class="nav-cta">Create account</a>
    </div>
  </div>

  <div class="page">
    <div class="card">
      <div class="badge">Welcome back</div>
      <h1>Login</h1>
      <p>Access your RevUp app, send SMS review requests, and view feedback.</p>

      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Your password" />

      <button onclick="login()">Login</button>

      <div id="error" class="error"></div>
      <div id="result" class="result"></div>

      <div class="small-link">
        No account yet? <a href="/register.html">Create one</a>
      </div>
    </div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const error = document.getElementById("error");
      const result = document.getElementById("result");

      error.innerText = "";
      result.innerText = "";

      if (!email || !password) {
        error.innerText = "Please enter email and password.";
        return;
      }

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!data.success) {
          error.innerText = "Invalid email or password.";
          return;
        }

        result.innerText = "✅ Logged in. Redirecting...";

        setTimeout(() => {
          window.location.href = "/index.html";
        }, 800);

      } catch (err) {
        error.innerText = "Could not connect to server.";
      }
    }
  </script>
</body>
</html>
