<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Feedback Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 30px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .name {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .business {
      font-size: 13px;
      color: #2563eb;
      margin-bottom: 8px;
    }

    .feedback {
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .date {
      font-size: 13px;
      color: #777;
    }

    .empty {
      background: white;
      border-radius: 12px;
      padding: 20px;
      color: #666;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      margin-bottom: 20px;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 id="dashboardTitle">Feedback Dashboard</h1>
    <p id="dashboardSubtitle">View customer feedback submitted through your review funnel.</p>

    <button onclick="loadFeedback()">Refresh Feedback</button>

    <div id="feedbackList"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const businessSlug = params.get("business");

    async function loadBusinessName() {
      if (!businessSlug) {
        document.getElementById("dashboardSubtitle").innerText =
          "Showing feedback for all businesses.";
        return;
      }

      try {
        const res = await fetch(`/business/${businessSlug}`);
        const business = await res.json();

        if (res.ok) {
          document.getElementById("dashboardTitle").innerText =
            `${business.businessName} Dashboard`;

          document.getElementById("dashboardSubtitle").innerText =
            "Showing feedback for this business only.";
        }
      } catch (err) {
        console.log("LOAD BUSINESS ERROR:", err);
      }
    }

    async function loadFeedback() {
      const container = document.getElementById("feedbackList");
      container.innerHTML = "<div class='empty'>Loading feedback...</div>";

      try {
        let url = "/get-feedback";

        if (businessSlug) {
          url += `?businessSlug=${encodeURIComponent(businessSlug)}`;
        }

        const res = await fetch(url);
        const data = await res.json();

        if (!data.length) {
          container.innerHTML = "<div class='empty'>No feedback submitted yet.</div>";
          return;
        }

        container.innerHTML = "";

        data.forEach(item => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <div class="name">${item.name || "Unknown customer"}</div>
            <div class="business">${item.businessName || item.businessSlug || ""}</div>
            <div class="feedback">${item.feedback}</div>
            <div class="date">${new Date(item.date).toLocaleString()}</div>
          `;

          container.appendChild(card);
        });
      } catch (error) {
        console.error("Dashboard error:", error);
        container.innerHTML = "<div class='empty'>Could not load feedback.</div>";
      }
    }

    loadBusinessName();
    loadFeedback();
  </script>
</body>
</html>
